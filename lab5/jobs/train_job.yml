$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command

display_name: amazon_review_model_training
experiment_name: all_features_experiment_sbert_tfidf_sentiment_length

code: ../src

command: >
  python train.py
  --train_data ${{inputs.train_data}}
  --val_data ${{inputs.val_data}}
  --test_data ${{inputs.test_data}}
  --output ${{outputs.model_output}}

inputs:
  train_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_train@latest

  val_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_val@latest

  test_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_test@latest

outputs:
  model_output:
    type: uri_folder

environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04
  conda_file: ../env/conda.yml

compute: azureml:cpu-cluster-2